gridsearch_adaboost_settings:
  general:
    cv_folds: 5
    scoring: 'accuracy'
    n_jobs: -1
    verbose: 1
    random_state: 42
    return_train_score: true

  balanced:
    # Número de estimadores (explorar alrededor del óptimo 200)
    n_estimators:  [300, 350, 400, 500]
    
    # Tasa de aprendizaje (explorar alrededor del óptimo 1.0)
    learning_rate: [1.0, 1.2, 1.4, 1.6] 
    
    # Para el estimador base (DecisionTreeClassifier) - Focalizado en mejores valores
    # Profundidad máxima (explorar alrededor del óptimo 3)
    estimator__max_depth: [1, 2, 3]
    
    # Criterio óptimo encontrado
    estimator__criterion: ['entropy']
    
    # Control de overfitting - parámetros adicionales para mejorar
    estimator__min_samples_split: [2, 3]
    estimator__min_samples_leaf: [1, 2]