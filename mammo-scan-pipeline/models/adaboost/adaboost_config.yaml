adaboost_settings:
  general:
    random_state: 42
    
  # Configuración del modelo AdaBoost
  model:
    # Estimador base (None = DecisionTreeClassifier por defecto)
    estimator: None
    # Número de estimadores en el ensemble
    n_estimators: 400
    # Tasa de aprendizaje
    learning_rate: 0.3
  base_estimator:
    max_depth: 5
    criterion: 'entropy'
    min_samples_split: 4
    min_samples_leaf: 1
    max_features: sqrt
    min_impurity_decrease: 0.0