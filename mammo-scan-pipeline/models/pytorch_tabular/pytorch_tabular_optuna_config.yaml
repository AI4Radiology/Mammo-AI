pytorch_tabular_optuna_settings:
  data:
    target: Tipo_Tejido

  trainer:
    early_stopping: valid_loss
    early_stopping_patience: 5
    progress_bar: none
    max_epochs: 50

  model:
    use_batch_norm: true
    initialization: kaiming

  search_space:
    learning_rate:
      type: float
      low: 1e-4
      high: 1e-2
      log: true
    batch_size:
      type: categorical
      choices: [256, 512, 1024, 2048]
    dropout:
      type: float
      low: 0.1
      high: 0.5
    layers:
      type: categorical
      choices:
        - "256-128"
        - "512-256"
        - "1024-512"
        - "1024-512-256"
        - "2048-1024-512"
        - "2048-1024-512-256-128"
        - "4096-2048-1024-512-256-128"
    activation:
      type: categorical
      choices: [ReLU, LeakyReLU, GELU]
    optimizer:
      type: categorical
      choices: [Adam, AdamW]
    weight_decay:
      type: float
      low: 1e-6
      high: 1e-2
      log: true
