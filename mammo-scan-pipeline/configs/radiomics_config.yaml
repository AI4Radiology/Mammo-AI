radiomic_extraction_settings:
  # Tipos de imagen habilitados en el extractor
  enableImageTypes:
    Original: {}
    Wavelet: {}
    LoG:
      sigma: [2.0]
    #LBP2D:
      #lbp2DRadius: 1
      #lbp2DMethod: 'uniform'
      #lbp2DSamples: 8

  # Normalización (booleana)
  normalize: true
  normalizeScale: 100

  # Espaciado de píxel explícito (null significa sin especificar)
  pixelSpacing: null
  resampledPixelSpacing: null

  # Clases de características activas en el script
  enableFeatureClasses:
    - glcm
    - glrlm
    - glszm
    - gldm
    - ngtdm
    - firstorder
    - shape2D

  # Forzar extracción 2D
  force2D: true
  
  # Ancho de bin para mamografías
  binWidth: 25
  
  # Padding para filtros LoG
  #padDistance: 5
  
  # Pre-crop para acelerar procesamiento
  preCrop: true

  # Columnas diagnósticas que eliminan tras la extracción
  columns_to_eliminate:
    - diagnostics_Versions_PyRadiomics
    - diagnostics_Versions_Numpy
    - diagnostics_Versions_SimpleITK
    - diagnostics_Versions_PyWavelet
    - diagnostics_Versions_Python
    - diagnostics_Configuration_Settings
    - diagnostics_Configuration_EnabledImageTypes
    - diagnostics_Image-original_Hash
    - diagnostics_Image-original_Dimensionality
    - diagnostics_Image-original_Spacing
    - diagnostics_Image-original_Size
    - diagnostics_Mask-original_Hash
    - diagnostics_Mask-original_Spacing
    - diagnostics_Mask-original_Size
    - diagnostics_Mask-original_BoundingBox
    - diagnostics_Mask-original_CenterOfMassIndex
    - diagnostics_Mask-original_CenterOfMass