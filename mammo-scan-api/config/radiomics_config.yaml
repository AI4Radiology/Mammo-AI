# Configuración optimizada para extracción de radiomics en mamografías
# 
# IMPORTANTE: Esta configuración fue optimizada empíricamente comparando
# los valores extraídos con el dataset de entrenamiento proporcionado.
# 
# Configuración clave:
# - NO normalizar (normalize: false) - CRÍTICO para valores precisos
# - Mantener intensidades originales del DICOM sin modificación
# - Usar segmentación mínima solo para crear máscara
# - NO aplicar filtros de denoising, CLAHE, o bilateral
#
# Resultados de validación:
# - 100% de features k-best dentro del rango del dataset
# - Diferencia promedio: 8.4% vs valores de referencia

radiomic_extraction_settings:
  # Tipos de imagen habilitados en el extractor
  enableImageTypes:
    Original: {}

  # Normalización (CRÍTICO: debe ser false)
  # NO normalizar mantiene los valores originales del DICOM
  # que son necesarios para radiomics precisos
  normalize: false

  # Espaciado de píxel explícito (null = usar del DICOM si está disponible)
  pixelSpacing: null
  resampledPixelSpacing: null

  # Ancho de bin para discretización
  binWidth: 25

  # Clases de características activas
  enableFeatureClasses:
    - glcm
    - glrlm
    - glszm
    - gldm
    - ngtdm
    - firstorder
    - shape2D

  # Forzar extracción 2D (mamografías son 2D)
  force2D: true
  force2Ddimension: 0

  # Columnas diagnósticas que se eliminan tras la extracción
  columns_to_eliminate:
    - diagnostics_Versions_PyRadiomics
    - diagnostics_Versions_Numpy
    - diagnostics_Versions_SimpleITK
    - diagnostics_Versions_PyWavelet
    - diagnostics_Versions_Python
    - diagnostics_Configuration_Settings
    - diagnostics_Configuration_EnabledImageTypes
    - diagnostics_Image-original_Hash
    - diagnostics_Image-original_Dimensionality
    - diagnostics_Image-original_Spacing
    - diagnostics_Image-original_Size
    - diagnostics_Mask-original_Hash
    - diagnostics_Mask-original_Spacing
    - diagnostics_Mask-original_Size
    - diagnostics_Mask-original_BoundingBox
    - diagnostics_Mask-original_CenterOfMassIndex
    - diagnostics_Mask-original_CenterOfMass
